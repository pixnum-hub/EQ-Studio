<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1e2130"/>
      <stop offset="100%" stop-color="#0e0f14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur8">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Rings -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.22"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.32"/>
  <circle cx="256" cy="256" r="132" fill="none" stroke="#00e5ff" stroke-width="2"   stroke-opacity="0.42"/>

  <!-- Inner glow blobs -->
  <circle cx="256" cy="256" r="90"  fill="#00e5ff" fill-opacity="0.07" filter="url(#blur8)"/>
  <circle cx="256" cy="256" r="55"  fill="#00e5ff" fill-opacity="0.12" filter="url(#blur4)"/>
  <circle cx="256" cy="256" r="28"  fill="#00e5ff" fill-opacity="0.20"/>

  <!-- Core dot -->
  <circle cx="256" cy="256" r="14" fill="#ffffff" fill-opacity="0.90"/>

  <!-- EQ bars (bottom half) -->
  <g fill="#00e5ff" fill-opacity="0.88">
    <!-- bar heights correspond to a subtle EQ curve shape -->
    <rect x="138" y="320" width="22" height="50"  rx="4"/>
    <rect x="170" y="305" width="22" height="65"  rx="4"/>
    <rect x="202" y="285" width="22" height="85"  rx="4"/>
    <rect x="234" y="298" width="22" height="72"  rx="4"/>
    <rect x="266" y="278" width="22" height="92"  rx="4"/>
    <rect x="298" y="308" width="22" height="62"  rx="4"/>
    <rect x="330" y="322" width="22" height="48"  rx="4"/>
  </g>
  <!-- EQ bar glow -->
  <g fill="#00e5ff" fill-opacity="0.18" filter="url(#blur4)">
    <rect x="138" y="320" width="22" height="50"  rx="4"/>
    <rect x="202" y="285" width="22" height="85"  rx="4"/>
    <rect x="266" y="278" width="22" height="92"  rx="4"/>
  </g>

  <!-- "EQ" label -->
  <text x="256" y="192" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
        font-size="72" font-weight="900" fill="#00e5ff" fill-opacity="0.92"
        letter-spacing="-2">EQ</text>

  <!-- Subtle radial lines (decorative spokes) -->
  <g stroke="#00e5ff" stroke-opacity="0.10" stroke-width="1">
    <line x1="256" y1="256" x2="456" y2="256"/>
    <line x1="256" y1="256" x2="56"  y2="256"/>
    <line x1="256" y1="256" x2="256" y2="56"/>
    <line x1="256" y1="256" x2="256" y2="456"/>
    <line x1="256" y1="256" x2="397" y2="115"/>
    <line x1="256" y1="256" x2="115" y2="397"/>
    <line x1="256" y1="256" x2="397" y2="397"/>
    <line x1="256" y1="256" x2="115" y2="115"/>
  </g>
</svg>
